name:                glados-vm
version:             0.1.0.0
github:              "Khambou/glados-vm"
license:             BSD-3-Clause
author:              "Cédric Khambounheuang"
maintainer:          "cedric.khambounheuang@epitech.eu"
copyright:           "2025"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/Khambou/glados-vm#readme>

dependencies:
- base >= 4.14 && < 5
- bytestring
- containers
- mtl
- vector

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Glados.VM.Types
  - Glados.VM.Runtime
  - Glados.VM.Exec
  - Glados.VM.WasmDecodeSubset

executables:
  glados-vm-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - glados-vm

tests:
  glados-vm-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - glados-vm
